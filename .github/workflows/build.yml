name: 'Build'

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build_duckdb:
    strategy:
      matrix:
        config:
          - runner: ubuntu-latest
            image: x86_64
            vcpkg_target_triplet: x64-linux
            platform: linux/amd64
            extension_ci_tools_dockerfile: linux_amd64
          - runner: ubuntu-24.04-arm
            image: aarch64
            vcpkg_target_triplet: arm64-linux
            platform: linux/arm64
            extension_ci_tools_dockerfile: linux_arm64
    name: 'Build Static DuckDB Library (${{ matrix.config.vcpkg_target_triplet }})'
    env:
      DUCKDB_GIT_REF: v1.5.0
    permissions:
      contents: read
      packages: write
    runs-on: ${{ matrix.config.runner }}
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v6
      - name: 'Setup QEMU'
        uses: docker/setup-qemu-action@v4
      - name: 'Setup Buildx'
        uses: docker/setup-buildx-action@v4
      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: 'Checkout extension-ci-tools'
        uses: actions/checkout@v6
        with:
          repository: 'duckdb/extension-ci-tools'
          ref: ${{ env.DUCKDB_GIT_REF }}
          path: 'extension-ci-tools'
      - name: 'Build DuckDB Builder'
        id: build_duckdb_builder
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: ${{ matrix.config.platform }}
          file: 'extension-ci-tools/docker/${{ matrix.config.extension_ci_tools_dockerfile }}/Dockerfile'
          context: ${{ github.workspace }}
          tags: 'ghcr.io/explore-flights/libduckdb_builder:${{ env.DUCKDB_GIT_REF }}_${{ matrix.config.extension_ci_tools_dockerfile }}'
          build-args: |
            vcpkg_url=https://github.com/microsoft/vcpkg.git
            vcpkg_commit=84bab45d415d22042bd0b9081aea57f362da3f35
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: 'Build DuckDB'
        uses: docker/build-push-action@v7
        with:
          push: false
          platforms: ${{ matrix.config.platform }}
          file: 'Dockerfile'
          context: ${{ github.workspace }}
          build-args: |
            IMAGE_REFERENCE=ghcr.io/explore-flights/libduckdb_builder:${{ env.DUCKDB_GIT_REF }}_${{ matrix.config.extension_ci_tools_dockerfile }}
            EXTENSION_CONFIG=extension_config.cmake
            VCPKG_TARGET_TRIPLET=${{ matrix.config.vcpkg_target_triplet }}
            DUCKDB_GIT_REF=${{ env.DUCKDB_GIT_REF }}
          outputs: 'type=local,dest=./dist'
      - name: 'Rename File'
        run: mv "dist/libduckdb_bundle.a" "dist/libduckdb_bundle-${{ matrix.config.vcpkg_target_triplet }}.a"
      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: 'libduckdb_bundle-${{ matrix.config.vcpkg_target_triplet }}.a'
          path: 'dist/libduckdb_bundle-${{ matrix.config.vcpkg_target_triplet }}.a'

  release:
    if: github.ref_type == 'tag'
    name: 'Release'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build_duckdb
    steps:
      - name: 'Download Artifacts'
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'libduckdb_bundle-*.a'
          merge-multiple: true
      - name: 'Release'
        uses: softprops/action-gh-release@v2
        with:
          files: 'artifacts/**/libduckdb_bundle-*.a'
          make_latest: true
